<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="points" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="points" id="computerScore">0</span>
            </div>
        </div>
        
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <p>Controls: Arrow Keys ↑↓ or Mouse Movement</p>
            <p>Press <strong>SPACE</strong> to start/pause the game</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
